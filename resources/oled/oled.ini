# ============================================
# OLED 显示服务配置文件
# ============================================
# 
# 此文件由安装脚本生成，请根据实际情况修改
# 修改后需要重启服务: systemctl --user restart oled
# 
# ============================================

[SERVER]
# LMS 服务器 IP 地址（必填）
HOST_IP = 192.168.50.210

# LMS CLI 端口（默认 9000）
HOST_Port = 9000

# 播放器 ID（可选）
# 如果不填写，将自动使用 eth0 的 MAC 地址
# PLAYER_ID = dc:a6:32:40:b5:ff
