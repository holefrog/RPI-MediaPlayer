# ============================================
# RPI MediaPlayer 配置文件
# ============================================
# 修改后运行 ./setup.sh 自动部署
# 
# 注意事项:
# 1. 所有必填项不能为空
# 2. MAC 地址格式: xx:xx:xx:xx:xx:xx
# 3. 端口号范围: 1024-65535
# 4. I2C 地址格式: 0xXX (十六进制)
# ============================================

# ============================================
# SSH 连接配置（setup.sh 使用）
# ============================================
[ssh]
# 树莓派主机名或 IP 地址（必填）
host=rpi.local

# SSH 用户名（必填）
user=player

# SSH 端口（可选，默认 22）
port=22

# SSH 私钥路径（必填）
# ⚠️ 注意: 请勿将私钥提交到 Git 仓库！
key=./rpi_keys/id_rpi

# ============================================
# 安装模块开关（install.sh 使用）
# ============================================
[modules]
# 设置 yes/no 来启用/禁用模块
# 
# ⚠️ 依赖关系:
#   - squeezelite/airplay/volume 需要 pipewire
#   - pipewire 建议启用 audio
#   - oled 需要 I2C (通过 audio 模块启用)
# 
# system    - 系统基础配置（时区、主机名、SSH）
# audio     - WM8960 音频驱动（需要重启）
# pipewire  - PipeWire 音频服务（其他音频服务的基础）
# volume    - 音量控制脚本
# squeezelite - Squeezelite 播放器（LMS 客户端）
# oled      - OLED 显示屏
# airplay   - AirPlay 接收器
# bluetooth - 蓝牙音频接收器

system=yes
audio=no
pipewire=no
volume=no
squeezelite=no
oled=no
airplay=no
bluetooth=yes

# ============================================
# 设备信息（必填）
# ============================================
[device]
# 设备名称（用于标识）
name=rpi-player

# 主机名（修改后需要重启）
hostname=rpi

# ============================================
# WM8960 音频驱动（必填）
# ============================================
[audio]
# 音频类型（仅支持 wm8960）
type=wm8960
# 自动配置 /boot/firmware/config.txt
# ⚠️ 需要重启后生效

# ============================================
# 系统配置（可选）
# ============================================
[system]
# 时区（留空则不修改）
# 示例: America/Vancouver, Asia/Shanghai, Europe/London
timezone=America/Vancouver

# 是否自动更新系统（yes/no）
auto_update=yes

# ============================================
# Squeezelite 播放器（如果启用则必填）
# ============================================
[squeezelite]
# 播放器名称（必填，LMS 中显示的名称）
name=RPI-Squeeze

# LMS 服务器地址（必填，格式: IP:端口 或 IP，默认端口 3483）
server=192.168.50.210

# 播放器 MAC 地址（必填，格式: xx:xx:xx:xx:xx:xx）
# 从 eth0 获取 MAC 地址: dc:a6:32:40:b5:f5
mac=dc:a6:32:40:b5:f5

# ALSA 输出设备（可选，默认 default）
device=default

# 额外参数（可选）
# 常用参数:
#   -a 40:4:32:0  - 音频缓冲设置
#   -b 500:5000   - 流缓冲设置
#   -d all=info   - 调试日志
args=-a 40:4:32:0 -b 500:5000

# ============================================
# AirPlay (Shairport-Sync)（如果启用则必填）
# ============================================
[airplay]
# AirPlay 服务名称（必填，Apple 设备上显示的名称）
name=RPI-AirPlay

# 监听端口（必填，范围 1024-65535，推荐 5000）
port=5000

# ALSA 输出设备（可选，默认 default）
device=default

# ============================================
# 蓝牙音频（如果启用则必填）
# ============================================
[bluetooth]
# 蓝牙设备名称（必填，配对时显示的名称）
name=RPI-Bluetooth

# ============================================
# OLED 显示屏（如果启用则必填）
# ============================================
[oled]
# OLED 类型（仅支持 ssd1306）
type=ssd1306

# I2C 总线编号（通常是 1 或 3）
# - I2C-1: 使用 GPIO2 (SDA) 和 GPIO3 (SCL) - 默认 I2C 总线
# - I2C-3: 使用 GPIO4 (SDA) 和 GPIO5 (SCL) - 通过 dtoverlay 配置
# 使用 'ls /dev/i2c-*' 查看可用总线
# 使用 'i2cdetect -y <bus>' 扫描设备
bus=3

# -------------------------------------------
# (★ 新增) 仅当 bus=3 (模拟I2C) 时生效
# -------------------------------------------
# 模拟 I2C-3 使用的 SDA 引脚 (默认 4)
i2c_gpio_sda=4

# 模拟 I2C-3 使用的 SCL 引脚 (默认 5)
i2c_gpio_scl=5
# -------------------------------------------

# I2C 地址（格式: 0xXX，常见值: 0x3C 或 0x3D）
# 使用 'i2cdetect -y 3' 查看实际地址
address=0x3C

# 显示屏宽度（像素）
width=128

# 显示屏高度（像素）
height=64
