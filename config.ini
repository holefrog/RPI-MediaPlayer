# ============================================
# RPI MediaPlayer 配置文件
# ============================================
# 修改后运行 ./setup.sh 自动部署
# ============================================

# ============================================
# SSH 连接配置（setup.sh 使用）
# ============================================
[ssh]
host=rpi.local
user=player
port=22
key=./rpi_keys/id_rpi

[system]
timezone=America/Vancouver
auto_update=yes

[squeezelite]
name=RPI-Squeeze
server=192.168.50.210
device=default

# 常用参数:
#   -a 40:4:32:0  - 音频缓冲设置
#   -b 500:5000   - 流缓冲设置
#   -d all=info   - 调试日志
args=-a 40:4:32:0 -b 500:5000

[airplay]
name=RPI-AirPlay
port=5000
device=default

# 初始音量 (0-100)
initial_volume=60

[bluetooth]
name=RPI-Bluetooth
# 蓝牙自动配对扫描间隔（秒）
check_interval=20

[wm8960]
bus=1

[oled]
width=128
height=64

# I2C 总线编号（通常是 1 或 3）
# - I2C-1: 使用 GPIO2 (SDA) 和 GPIO3 (SCL) - 默认 I2C 总线
# - I2C-3: 使用 GPIO4 (SDA) 和 GPIO5 (SCL) - 通过 dtoverlay 配置
# 使用 'ls /dev/i2c-*' 查看可用总线
# 使用 'i2cdetect -y <bus>' 扫描设备
bus=3

# I2C GPIO 引脚
sda_pin=4
scl_pin=5

# I2C 地址（格式: 0xXX，常见值: 0x3C 或 0x3D）
# 使用 'i2cdetect -y 3' 查看实际地址
address=0x3C

# 日志级别 (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_level=INFO

# ============================================
# 路径配置
# ============================================
[paths]
# 远程安装目录名
remote_install_dir=installer

# 应用根目录名
app_base_dir=rpi-mediaplayer

# OLED 虚拟环境路径
oled_venv_dir=.venv/oled

# AirPlay metadata 管道路径
metadata_pipe=/tmp/shairport-sync-metadata

# ============================================
# 超时配置（秒）
# ============================================
[timeouts]
# APT 锁等待超时
apt_lock=60

# PipeWire 就绪超时
pipewire_ready=30

# SSH 连接超时
ssh_connect=10

# 重启等待超时
reboot_wait=180

# 重启轮询间隔
reboot_poll_interval=5

# 🆕 部署脚本等待时间
deployment_initial_wait=2
deployment_offline_wait=5

# 🆕 蓝牙初始化延迟
bt_init_delay=2
bt_rfkill_delay=2

# 🆕 OLED 测试超时（秒）
oled_test_timeout=25

# ============================================
# 音频配置
# ============================================
[audio]
# ALSA 硬件音量（0-100）
default_hw_volume=95

# PipeWire Sink 默认音量（0-100）
default_sink_volume=100
